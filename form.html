<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldOfGT3Form</title>
    <link rel="stylesheet" href="CSS/Form.css" />
    <link rel="icon" href="images/WorldOfGT3.png" type="image/x-icon" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
  </head>
  <body>
    <div class="underblock">
      <h1>Kontakta oss</h1>

      <form action="Tack.html">
        <div class="kontakt">
          <label>Förnamn</label>
          <input type="text" placeholder="Skriv in ditt förnamn.." required />

          <label>Efternamn</label>
          <input type="text" placeholder="Skriv in ditt efternamn.." required />

          <label>Mail</label>
          <input type="”email”" placeholder="Skriv in din mail.." required />

          <label>Meddelande</label>
          <input
            type="text"
            placeholder="Skriv ditt meddelande här.."
            required
          />

          <button type="submit">Skicka</button>
        </div>
      </form>

      <div id="map"></div>
    </div>

    <footer>
      <div class="mapfooter">
        <script>
          mapboxgl.accessToken =
            "pk.eyJ1IjoiYmlrdG9yMTIzIiwiYSI6ImNtbmhiOHY1NzAwdXkycXNtbnYwbzNtYWUifQ.20rirDHbVmTLkN0_c2UQQg";

          const map = new mapboxgl.Map({
            container: "map",
            center: [18.06354, 59.44027],
            zoom: 15,
          });
        </script>
      </div>
    </footer>
  </body>
</html>
